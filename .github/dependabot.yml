version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /contract
    schedule:
      interval: weekly
      day: monday
      time: "03:15"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 3
    groups:
      contract-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: vitest
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
