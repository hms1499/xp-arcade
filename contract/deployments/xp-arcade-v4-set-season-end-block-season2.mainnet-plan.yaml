network: mainnet
stacks-node: https://api.hiro.so
bitcoin-node: http://blockstack:blockstacksystem@bitcoin.blockstack.com:8332
# Owner-only. Run with the deployer wallet:
#   clarinet deployments apply -p contract/deployments/xp-arcade-v4-set-season-end-block-season2.mainnet-plan.yaml --no-dashboard
# Never use -c on mainnet (it recomputes the fee).
#
# WHY: end-season does NOT reset season-end-block. Season 2 opened while the map
# still held the season-1 deadline (u8470355, long past the tip) -- a "stillborn"
# season: the frontend showed every game as expired and anyone could close it.
# This sets a FUTURE shared deadline H for all 6 games.
#
#   H = u8741624  (~30 days from stacks tip 8546952 @ ~13.3 s/block, ~2026-08-13)
#
# MUST run BEFORE the pool-seed plan, and before any future end-season call the
# NEXT H must be set first -- otherwise the new season is stillborn again.
